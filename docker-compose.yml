services:
  mysql:
    image: mysql:8.4
    container_name: erp-subsystem-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: erp_subsystem
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
